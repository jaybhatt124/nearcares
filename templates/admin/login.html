<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Smart Health Navigator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="admin-login-logo">🏥</div>
    <div class="admin-login-title">Admin Panel</div>
    <div class="admin-login-subtitle">Smart Health Navigator</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}" style="margin-bottom:16px;">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/admin/login">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:8px;">
        🔐 Sign In
      </button>
    </form>
    <p style="margin-top:20px; font-size:12px; color:var(--text-light);">
      Default: admin / admin123 &nbsp;|&nbsp; <a href="/" style="color:var(--primary);">← Back to Site</a>
    </p>
  </div>
</div>
</body>
</html>
